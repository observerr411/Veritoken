services:
  stellar:
    image: stellar/quickstart:latest
    command: --standalone --enable-soroban-rpc
    ports:
      - "8000:8000"
    environment:
      - NETWORK=standalone
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/soroban/rpc"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
