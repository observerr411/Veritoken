name: Build SDK

on:
  push:
    paths:
      - "sdk/**"
  pull_request:
    paths:
      - "sdk/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --workspace sdk

      - name: Build SDK
        run: npm run build:sdk
